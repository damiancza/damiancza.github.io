    <div id="confirma_salir_dlg" class="ui modal">

    <script>
        const apiUrl = "https://www.conectat.com.ar/api";

        let pacientes = [];

        // Get a value from the querystring
        function findGetParameter(parameterName) {
            var result = null,
                tmp = [];
            var items = location.search.substr(1).split("&");
            for (var index = 0; index < items.length; index++) {
                tmp = items[index].split("=");
                if (tmp[0] === parameterName) result = decodeURIComponent(tmp[1]);
            }
            return result;
        }

        $(document).ready(function () {
            cargarPacientes();

            $("#confirma_salir_dlg").modal({
                onShow: function () {
                },
                onDeny: function () {
                    return true;
                },
                onApprove: function () {
                    localStorage.removeItem("user");
                    localStorage.removeItem("focusDate");
                    localStorage.removeItem("pac");
                    window.location.href = "login.html";
                    return true;
                }
            });

            $("#logoutBtn").click(function () {
                $("#confirma_salir_dlg").modal("show");
            });
            /*
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker
                    .register('./sw.js');
            }
            */
        });

        function cargarPacientes() {
            let user = JSON.parse(localStorage.getItem('user'));

            let jwtString = `Bearer ${user.jwt}`;

            var myHeaders = new Headers();
            myHeaders.append("Content-Type", "application/json");
            myHeaders.append("MyAuthorization", jwtString);

            var requestOptions = {
                method: 'GET',
                headers: myHeaders,
                redirect: 'follow'
            };

            let url = `${apiUrl}/pacientes.php?at=${user.id}`;

            //*****************************************
            fetch(url, requestOptions)
                .then(function (res) {
                    return res.json(); //error here
                }).then(function (data) {
                    if (data.message != undefined) {
                        localStorage.removeItem("user");
                        window.location.href = "login.html";
                    }

                    let lista_pac = document.getElementById("lista_pacientes");

                    for (i in data) {
                        let elementTxt = `<a href="calendar_pac.html?pac=${data[i]["id_pac"]}" class="item">
                                              <i class="large blue user middle aligned icon"></i>
                                              <div class="content">
                                                   ${data[i]["iniciales"]}
                                              </div>
                                          </a>`;
                        lista_pac.innerHTML += elementTxt;
                    }

                }).catch((error) => {
                    console.log(error);
                });
        }


    </script>
